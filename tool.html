<!DOCTYPE html>
<html lang="en">
<head>

}

button{
background:#4f46e5;

border:none;

<body>

<div class="box">

<button>Upgrade to Pro – $12/month</button>

</a>

</div>

<hr>

<h3>Send Feedback</h3>

<textarea placeholder="Write your feedback"></textarea>

<br>

<button>Send Feedback</button>

</div>

function generate(){

if(used){

document.getElementById("upgrade").style.display="block";

}

used=true;

document.getElementById("result").innerHTML=

</html>
