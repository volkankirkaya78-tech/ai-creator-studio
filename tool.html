<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Caption Generator</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:40px;
border-radius:12px;
max-width:800px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

button{
background:#4f46e5;
color:white;
border:none;
padding:12px 24px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.preview{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

.result{
margin-top:30px;
text-align:left;
line-height:1.6;
}

.copy{
background:#111;
font-size:14px;
margin-left:10px;
padding:6px 10px;
}

.upgrade{
margin-top:40px;
display:none;
}

.email{
margin-top:30px;
}

input[type=email]{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="box">

<h1>AI Caption Generator</h1>

<p>Upload a photo and generate captions, hooks and hashtags.</p>

<input type="file" id="image">

<br>

<img id="preview" class="preview" style="display:none"/>

<br>

<button onclick="generate()">Generate Caption</button>

<div class="result" id="result"></div>

<div class="upgrade" id="upgrade">

<h3>Unlock unlimited AI tools</h3>

<p>You used your free generation.</p>

<a href="https://ai-creator-studio.lemonsqueezy.com/checkout/buy/eba7f826-a7ae-4527-a2d7-3fb7e6237384">

<button>Upgrade to Pro – $12/month</button>

</a>

</div>

<div class="email">

<p>Enter email to copy results later</p>

<input type="email" placeholder="your@email.com">

</div>

</div>

<script>

let used=false;

/* IMAGE PREVIEW */

document.getElementById("image").addEventListener("change",function(){

const file=this.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(e){

const preview=document.getElementById("preview");

preview.src=e.target.result;

preview.style.display="block";

}

reader.readAsDataURL(file);

});

/* COPY FUNCTION */

function copyText(text){

navigator.clipboard.writeText(text);

alert("Copied!");

}

/* GENERATE */

async function generate(){

if(used){

document.getElementById("upgrade").style.display="block";

return;

}

const file=document.getElementById("image").files[0];

if(!file){

alert("Upload image first");

return;

}

document.getElementById("result").innerHTML="AI analyzing image...";

const reader=new FileReader();

reader.onload=async function(){

try{

const response=await fetch(
"https://ai-caption-server-3rxf.onrender.com/caption",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image:reader.result,
style:"viral"
})
}
);

const data=await response.json();

let html="";

html+="<h3>Optimized Caption</h3>";
html+=data.optimized_caption+" <button class='copy' onclick='copyText(`"+data.optimized_caption+"`)'>copy</button>";

html+="<h3>Captions</h3>";
data.captions.forEach(c=>{
html+=c+"<br>";
});

html+="<h3>Hooks</h3>";
data.hooks.forEach(h=>{
html+=h+"<br>";
});

html+="<h3>Hashtags</h3>";
html+=data.hashtags.join(" ");

html+="<h3>Reel Script</h3>";
html+="Hook: "+data.reel_script.hook+"<br>";
html+="Scene: "+data.reel_script.scene+"<br>";
html+="Voiceover: "+data.reel_script.voiceover;

document.getElementById("result").innerHTML=html;

used=true;

}catch(e){

document.getElementById("result").innerHTML="AI generation failed.";

}

}

reader.readAsDataURL(file);

}

</script>

</body>

</html>
