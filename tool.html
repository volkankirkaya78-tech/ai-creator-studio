<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Creator Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#1f2235;
color:white;
padding:25px;
}

.sidebar h2{
margin-top:0;
}

.menu{
margin-top:30px;
}

.menu div{
padding:12px;
cursor:pointer;
border-radius:6px;
margin-bottom:8px;
}

.menu div:hover{
background:#323657;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.tool{
display:none;
}

.tool.active{
display:block;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

input,select{
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

.result{
margin-top:30px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>AI Creator</h2>

<div class="menu">

<div onclick="openTool('caption')">Caption Generator</div>
<div onclick="openTool('trend')">Trend Detector</div>
<div onclick="openTool('viral')">Viral Ideas</div>
<div onclick="openTool('calendar')">Content Calendar</div>
<div onclick="openTool('reel')">Reel Generator</div>
<div onclick="openTool('competitor')">Competitor Analyzer</div>

</div>

</div>

<div class="main">

<!-- CAPTION -->

<div id="caption" class="tool active">

<h2>Caption Generator</h2>

<select id="style">
<option>viral</option>
<option>funny</option>
<option>emotional</option>
<option>story</option>
<option>luxury</option>
</select>

<br>

<input type="file" id="image">

<br>

<button onclick="generateCaption()">Generate</button>

<div class="result" id="captionResult"></div>

</div>

<!-- TREND -->

<div id="trend" class="tool">

<h2>Trend Detector</h2>

<button onclick="detectTrends()">Find Trends</button>

<div class="result" id="trendResult"></div>

</div>

<!-- VIRAL IDEAS -->

<div id="viral" class="tool">

<h2>Viral Ideas</h2>

<button onclick="viralIdeas()">Generate Ideas</button>

<div class="result" id="viralResult"></div>

</div>

<!-- CALENDAR -->

<div id="calendar" class="tool">

<h2>Content Calendar</h2>

<input id="niche" placeholder="Enter niche">

<br>

<button onclick="calendar()">Generate Calendar</button>

<div class="result" id="calendarResult"></div>

</div>

<!-- REEL -->

<div id="reel" class="tool">

<h2>Reel Generator</h2>

<input id="topic" placeholder="Topic">

<br>

<input id="reelNiche" placeholder="Niche">

<br>

<select id="platform">

<option>Instagram</option>
<option>TikTok</option>
<option>YouTube</option>

</select>

<br>

<button onclick="generateReel()">Generate Reel</button>

<div class="result" id="reelResult"></div>

</div>

<!-- COMPETITOR -->

<div id="competitor" class="tool">

<h2>Competitor Analyzer</h2>

<input id="username" placeholder="Username">

<br>

<input id="compNiche" placeholder="Niche">

<br>

<select id="compPlatform">

<option>Instagram</option>
<option>TikTok</option>
<option>YouTube</option>

</select>

<br>

<button onclick="analyze()">Analyze</button>

<div class="result" id="competitorResult"></div>

</div>

</div>

</div>

<script>

const API="https://ai-caption-server-3rxf.onrender.com"

function openTool(name){

document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"))

document.getElementById(name).classList.add("active")

}

/* CAPTION */

async function generateCaption(){

const file=document.getElementById("image").files[0]
const style=document.getElementById("style").value

const reader=new FileReader()

reader.onload=async function(){

const res=await fetch(API+"/caption",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

image:reader.result,
style:style

})

})

const data=await res.json()

document.getElementById("captionResult").innerText=

JSON.stringify(data,null,2)

}

reader.readAsDataURL(file)

}

/* TREND */

async function detectTrends(){

const res=await fetch(API+"/trend-detector",{method:"POST"})

const data=await res.json()

document.getElementById("trendResult").innerText=

JSON.stringify(data,null,2)

}

/* VIRAL */

async function viralIdeas(){

const res=await fetch(API+"/viral-topics",{method:"POST"})

const data=await res.json()

document.getElementById("viralResult").innerText=

JSON.stringify(data,null,2)

}

/* CALENDAR */

async function calendar(){

const niche=document.getElementById("niche").value

const res=await fetch(API+"/content-calendar",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({ niche })

})

const data=await res.json()

document.getElementById("calendarResult").innerText=

JSON.stringify(data,null,2)

}

/* REEL */

async function generateReel(){

const topic=document.getElementById("topic").value
const niche=document.getElementById("reelNiche").value
const platform=document.getElementById("platform").value

const res=await fetch(API+"/reel-generator",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

topic,
niche,
platform

})

})

const data=await res.json()

document.getElementById("reelResult").innerText=

JSON.stringify(data,null,2)

}

/* COMPETITOR */

async function analyze(){

const username=document.getElementById("username").value
const niche=document.getElementById("compNiche").value
const platform=document.getElementById("compPlatform").value

const res=await fetch(API+"/competitor-analyzer",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

username,
niche,
platform

})

})

const data=await res.json()

document.getElementById("competitorResult").innerText=

JSON.stringify(data,null,2)

}

</script>

</body>
</html>
