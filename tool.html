<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Caption Generator</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:60px;
}

.box{
background:white;
padding:40px;
border-radius:12px;
max-width:700px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

button{
background:#4f46e5;
color:white;
border:none;
padding:14px 28px;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.result{
margin-top:30px;
font-size:18px;
line-height:1.6;
white-space:pre-line;
}

.upgrade{
margin-top:30px;
display:none;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="box">

<h1>AI Caption Generator</h1>

<p>Upload a photo and generate viral captions instantly.</p>

<input type="file" id="image">

<br>

<button onclick="generate()">Generate Caption</button>

<div class="result" id="result"></div>

<div class="upgrade" id="upgrade">

<h3>Unlock unlimited captions</h3>

<p>You used your free generation.</p>

<a href="https://ai-creator-studio.lemonsqueezy.com/checkout/buy/eba7f826-a7ae-4527-a2d7-3fb7e6237384">

<button>Upgrade to Pro – $12/month</button>

</a>

</div>

<hr>

<h3>Send Feedback</h3>

<textarea id="feedback" placeholder="Write your feedback"></textarea>

<br>

<button onclick="sendFeedback()">Send Feedback</button>

</div>

<script>

let used=false;

async function generate(){

if(used){

document.getElementById("upgrade").style.display="block";
return;

}

const fileInput=document.getElementById("image");

const file=fileInput.files[0];

if(!file){

alert("Please upload an image first");
return;

}

const formData=new FormData();

formData.append("image",file);

document.getElementById("result").innerHTML="AI analyzing image...";

try{

const response=await fetch("http://localhost:3000/api/generate-caption",{

method:"POST",
body:formData

});

const data=await response.json();

document.getElementById("result").innerHTML=data.caption;

used=true;

}catch(error){

document.getElementById("result").innerHTML="AI generation failed.";

}

}

function sendFeedback(){

const text=document.getElementById("feedback").value;

if(text.length<3){

alert("Write something first.");
return;

}

console.log("User feedback:",text);

alert("Thank you for your feedback!");

document.getElementById("feedback").value="";

}

</script>

</body>
</html>
